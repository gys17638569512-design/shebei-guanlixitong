services:
  mysql:
    image: mysql:8.4
    container_name: crane-mms-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ../../runtime/mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - crane-net

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: crane-mms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      TZ: ${TZ}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    volumes:
      - ../../runtime/uploads:/app/backend/uploads
      - ../../runtime/logs/backend:/app/backend/run-logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - crane-net

  nginx:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend-nginx.Dockerfile
    container_name: crane-mms-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-80}:80"
      - "${PORTAL_PORT:-8080}:8080"
    volumes:
      - ../../runtime/logs/nginx:/var/log/nginx
    networks:
      - crane-net

networks:
  crane-net:
    driver: bridge
